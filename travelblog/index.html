<!DOCTYPE html>
<html>
<head>
    <title>Travel Blog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <h2>Travel Blog</h2>

        <a href="#">Home</a>
        <a href="#">Places</a>
        <a href="#">About</a>
    </nav>


    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-text">
            <h1>Explore The World</h1>
            <p>Travel and discover beautiful places</p>
            <button>Explore</button>
        </div>
    </div>


    <!-- Destination Section -->
    <div class="destination">

        <h2>Featured Destinations</h2>

        <div class="cards">

            <div class="card">
                <img src="https://picsum.photos/300/200?1">
                <h3>Paris</h3>
                <p>Visit the beautiful city of Paris.</p>
            </div>


            <div class="card">
                <img src="https://picsum.photos/300/200?2">
                <h3>Maldives</h3>
                <p>Enjoy the beautiful beaches.</p>
            </div>


            <div class="card">
                <img src="https://picsum.photos/300/200?3">
                <h3>Switzerland</h3>
                <p>Enjoy mountains and nature.</p>
            </div>

        </div>

    </div>

</body>
</html>
